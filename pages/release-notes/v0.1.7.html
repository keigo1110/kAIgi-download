<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>kAIgi 0.1.7</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #ffffff;
      color: #1f2328;
    }

    body {
      margin: 0;
      padding: 24px 28px 28px;
      font-size: 15px;
      line-height: 1.65;
      background: #ffffff;
      color: #1f2328;
    }

    main {
      max-width: 760px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.25;
      font-weight: 700;
    }

    p {
      margin: 0 0 18px;
      color: #57606a;
    }

    ul {
      margin: 0;
      padding-left: 1.25em;
    }

    li {
      margin: 0 0 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root,
      body {
        background: #0d1117;
        color: #f0f6fc;
      }

      p {
        color: #8b949e;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>kAIgi 0.1.7</h1>
    <p>OpenAI APIキーの保存に失敗する問題を修正したメンテナンスリリースです。</p>
    <ul>
      <li>OpenAI APIキーをKeychainへ保存できないことがある問題を修正しました。</li>
      <li>macOSが署名権限を無視する無効なentitlementsを配布ビルドから取り除きました。</li>
      <li>Keychainの権限エラーが起きた場合、原因が分かる案内を表示するようにしました。</li>
      <li>リリースビルド時に無効なentitlementsを検出して停止する検証を追加しました。</li>
    </ul>
  </main>
</body>
</html>
