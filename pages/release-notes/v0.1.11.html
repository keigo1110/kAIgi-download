<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>kAIgi 0.1.11</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #ffffff;
      color: #1f2328;
    }

    body {
      margin: 0;
      padding: 24px 28px 28px;
      font-size: 15px;
      line-height: 1.65;
      background: #ffffff;
      color: #1f2328;
    }

    main {
      max-width: 760px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.25;
      font-weight: 700;
    }

    p {
      margin: 0 0 18px;
      color: #57606a;
    }

    ul {
      margin: 0;
      padding-left: 1.25em;
    }

    li {
      margin: 0 0 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root,
      body {
        background: #0d1117;
        color: #f0f6fc;
      }

      p {
        color: #8b949e;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>kAIgi 0.1.11</h1>
    <p>録音権限、AIマップ、Research Cardの復元性を高めたリリースです。</p>
    <ul>
      <li>macOSのマイク権限でkAIgiが正しく表示されるよう、署名と権限設定を修正しました。</li>
      <li>AIマップを議論の流れに沿ったコミットと分岐として残せるようにしました。</li>
      <li>録音終了後も、最終版の構造化サマリーを履歴から見られるようにしました。</li>
      <li>Deep ResearchやResearch Cardの結果をAIマップへ反映し、調べた内容のつながりを追いやすくしました。</li>
      <li>長めの発話でも文字起こしが詰まりにくいよう、ライブ更新と後処理の安定性を改善しました。</li>
    </ul>
  </main>
</body>
</html>
